<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - KiroBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            border: 'hsl(240 3.7% 15.9%)',
            background: 'hsl(240 10% 3.9%)',
            foreground: 'hsl(0 0% 98%)',
            muted: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(240 5% 64.9%)' },
            secondary: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(0 0% 98%)' },
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: hsl(240 10% 3.9%); color: hsl(0 0% 98%); }

    /* MUI-style floating label inputs */
    .mui-field { position: relative; margin-bottom: 20px; }
    .mui-field input {
      width: 100%;
      padding: 20px 14px 8px;
      background: hsl(240 3.7% 10%);
      border: 1px solid hsl(240 3.7% 22%);
      border-radius: 8px;
      color: hsl(0 0% 98%);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .mui-field input:focus {
      border-color: hsl(0 0% 60%);
      box-shadow: 0 0 0 1px hsl(0 0% 60%);
    }
    .mui-field label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: hsl(240 5% 64.9%);
      font-size: 15px;
      pointer-events: none;
      transition: all 0.2s ease;
    }
    .mui-field input:focus ~ label,
    .mui-field input:not(:placeholder-shown) ~ label {
      top: 10px;
      transform: translateY(0);
      font-size: 11px;
      color: hsl(0 0% 60%);
      font-weight: 500;
    }
    .mui-field .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: hsl(240 5% 50%);
      padding: 4px;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }

    .desktop-warning { display: none; }
    @media (min-width: 1024px) { .desktop-warning { display: flex; } }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Desktop Warning -->
  <div class="desktop-warning fixed inset-0 z-[200] bg-background flex-col items-center justify-center text-center p-8">
    <div class="max-w-md">
      <div class="text-6xl mb-6">📱</div>
      <h1 class="text-2xl font-bold mb-3">Mobile Experience</h1>
      <p class="text-muted-foreground mb-6">KiroBox is designed for mobile devices.</p>
      <button onclick="document.querySelector('.desktop-warning').style.display='none'" class="px-6 py-2.5 bg-white text-black rounded-lg font-medium text-sm">Continue Anyway</button>
    </div>
  </div>

  <!-- Back button -->
  <div class="flex items-center p-4 pt-safe">
    <a href="/index.html" class="flex items-center gap-2 text-muted-foreground text-sm">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="m12 5-7 7 7 7"/></svg>
      Back
    </a>
  </div>

  <!-- Form Container -->
  <div class="flex-1 flex flex-col justify-center px-6 py-8 max-w-sm mx-auto w-full fade-up">

    <!-- Logo -->
    <div class="mb-10 text-center">
      <h1 class="font-black text-3xl tracking-tight mb-1">KIRO<span class="text-muted-foreground font-light">BOX</span></h1>
      <p class="text-muted-foreground text-sm">Welcome back</p>
    </div>

    <!-- Error -->
    <div id="errorMsg" class="hidden mb-4 p-3 rounded-lg border border-red-500/30 bg-red-500/10 text-red-400 text-sm"></div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
      <div class="mui-field">
        <input type="text" id="username" placeholder=" " required autocomplete="username" />
        <label for="username">Username</label>
      </div>

      <div class="mui-field">
        <input type="password" id="password" placeholder=" " required autocomplete="current-password" />
        <label for="password">Password</label>
        <button type="button" class="toggle-pw" onclick="togglePw('password', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button type="submit" id="submitBtn" class="w-full py-3 bg-white text-black font-semibold rounded-lg text-sm hover:bg-white/90 active:scale-95 transition-all mt-2 flex items-center justify-center gap-2">
        <span>Login</span>
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-border"></div>
      <span class="text-xs text-muted-foreground">or</span>
      <div class="flex-1 h-px bg-border"></div>
    </div>

    <!-- Sign up link -->
    <p class="text-center text-sm text-muted-foreground">
      Don't have an account?
      <a href="/signup.html" class="text-foreground font-medium ml-1 underline underline-offset-2">Sign up</a>
    </p>
  </div>

  <script>
    const API = 'https://kirobox-api-0kfe.onrender.com';

    // Redirect if already logged in
    if (localStorage.getItem('kirobox_token')) {
      window.location.href = '/profile.html';
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="w-5 h-5 border-2 border-black/30 border-t-black rounded-full animate-spin"></div>';

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        localStorage.setItem('kirobox_token', data.token);
        localStorage.setItem('kirobox_username', data.username);
        localStorage.setItem('kirobox_role', data.role);

        // Redirect
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
        window.location.href = redirect;
      } catch(err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Login</span>';
      }
    }
  </script>
</body>
</html>
